<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CLINIQ</title>
  <link rel="icon" href="data:,">

  <!-- ===== GOOGLE FONTS — Fraunces (display, serif editorial) + Hanken Grotesk (UI) ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- ===== DESIGN TOKENS + BASE + UTILITÁRIOS ===== -->
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/landing.css">
</head>
<body>
  <div id="app"></div>
  <div class="grain" aria-hidden="true"></div>

  <!-- ===== VENDOR (ordem importa) ===== -->
  <script src="vendor/react.development.js"></script>
  <script src="vendor/react-dom.development.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/lucide.min.js"></script>
  <!-- Lenis — smooth scroll (UMD global window.Lenis) -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.20/dist/lenis.min.js"></script>

  <!-- ===== COMPONENTES (ordem importa — cada arquivo lê window.* dos anteriores) ===== -->

  <!-- 1. Primitivos compartilhados: Icon, Button, Badge, Container, Eyebrow, Reveal -->
  <script type="text/babel" src="components/atoms.jsx"></script>

  <!-- 2. Painel de tweaks de design (useTweaks, TweaksPanel, etc.) -->
  <script type="text/babel" src="components/TweaksPanel.jsx"></script>

  <!-- 3. Canvas contínuo (FlowBackdrop / FlowEyebrow) — antes das seções que o usam -->
  <script type="text/babel" src="components/PageCanvas.jsx"></script>

  <!-- 4. Seções da página — mesma ordem que o App as renderiza -->
  <script type="text/babel" src="components/Nav.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/Integrations.jsx"></script>
  <script type="text/babel" src="components/Diagnosis.jsx"></script>
  <script type="text/babel" src="components/Solution.jsx"></script>
  <script type="text/babel" src="components/Proof.jsx"></script>
  <script type="text/babel" src="components/Offer.jsx"></script>
  <script type="text/babel" src="components/Close.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>
  <script type="text/babel" src="components/Quiz.jsx"></script>

  <!-- 4. Raiz — monta ReactDOM.createRoot('#app') -->
  <script type="text/babel" src="components/App.jsx"></script>
</body>
</html>
